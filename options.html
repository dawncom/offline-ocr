<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screen OCR Model</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e2e;
      --panel: #242438;
      --panel-2: #313244;
      --text: #cdd6f4;
      --muted: #a6adc8;
      --blue: #4a90d9;
      --orange: #f5a623;
      --danger: #f38ba8;
      --ok: #a6e3a1;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      border: 1px solid #45475a;
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(240px, 0.8fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .guide {
      border: 1px solid #45475a;
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
    }

    .guide h2 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .guide p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .guide p:last-child {
      margin-bottom: 0;
    }

    .guide a {
      color: #89b4fa;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .guide a:hover {
      text-decoration: underline;
    }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 10px;
    }

    .file-chip,
    .shortcut-value {
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #181825;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .file-chip {
      padding: 5px 7px;
    }

    .hint {
      color: #bac2de;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }

    .shortcut-value {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 9px;
      white-space: nowrap;
    }

    code {
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #181825;
      color: var(--text);
      padding: 1px 4px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 8px 14px;
      font-size: 13px;
      line-height: 1.4;
    }

    .label {
      color: var(--muted);
    }

    .value {
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: var(--panel-2);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .pill.ok {
      color: var(--ok);
    }

    .pill.error {
      color: var(--danger);
    }

    form {
      border: 1px solid #45475a;
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      min-height: 40px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: #181825;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }

    input[type="file"] {
      padding: 7px 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      min-height: 38px;
      border: 1px solid #585b70;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--blue);
      background: #24476c;
    }

    button.warn {
      border-color: #8a5a19;
      background: #4b371c;
      color: #ffd79a;
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .message.error {
      color: var(--danger);
    }

    .message.ok {
      color: var(--ok);
    }

    @media (max-width: 680px) {
      main {
        width: min(100vw - 24px, 760px);
        padding: 24px 0;
      }

      .setup-grid,
      .status-grid {
        grid-template-columns: 1fr;
      }

      .status-grid {
        gap: 4px 0;
      }

      .value {
        margin-bottom: 6px;
      }

      .shortcut-row {
        align-items: stretch;
        flex-direction: column;
      }

      .shortcut-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>OCR Model</h1>
      <span id="readyPill" class="pill">Loading</span>
    </header>

    <div class="setup-grid">
      <section class="guide">
        <h2>模型下载</h2>
        <p>
          PP-OCRv6 模型可从
          <a href="https://huggingface.co/collections/PaddlePaddle/pp-ocrv6" target="_blank" rel="noreferrer">
            PaddlePaddle / pp-ocrv6
          </a>
          下载。
        </p>
        <p>选择需要的识别模型大小后，上传该模型目录中的匹配文件：</p>
        <div class="file-list" aria-label="所需模型文件">
          <span class="file-chip">inference.onnx</span>
          <span class="file-chip">inference.yml</span>
        </div>
        <p class="hint">模型名称由你自定义，会显示在 OCR 结果框标题。当前替换入口面向 rec 识别模型。</p>
      </section>

      <section class="guide">
        <h2>快捷键</h2>
        <p>Chrome 负责管理扩展快捷键。打开快捷键设置页后，可修改框选识别热键。</p>
        <div class="shortcut-row">
          <span id="shortcutValue" class="shortcut-value">Ctrl+Shift+Z</span>
          <button id="shortcutButton" type="button">打开快捷键设置</button>
        </div>
      </section>
    </div>

    <section class="status" aria-live="polite">
      <div class="status-grid">
        <div class="label">Source</div>
        <div id="sourceValue" class="value">-</div>
        <div class="label">Name</div>
        <div id="nameValue" class="value">-</div>
        <div class="label">Model</div>
        <div id="modelValue" class="value">-</div>
        <div class="label">Characters</div>
        <div id="charsValue" class="value">-</div>
        <div class="label">Input / Output</div>
        <div id="ioValue" class="value">-</div>
        <div class="label">Saved</div>
        <div id="savedValue" class="value">-</div>
      </div>
    </section>

    <form id="modelForm">
      <div class="field">
        <label for="displayName">Model name</label>
        <input id="displayName" type="text" placeholder="Custom OCR rec model" autocomplete="off">
      </div>

      <div class="field">
        <label for="onnxFile">ONNX model</label>
        <input id="onnxFile" type="file" accept=".onnx,application/octet-stream">
      </div>

      <div class="field">
        <label for="configFile">Inference YAML</label>
        <input id="configFile" type="file" accept=".yml,.yaml,text/yaml,text/plain">
      </div>

      <div class="actions">
        <button id="saveButton" class="primary" type="submit">Save model</button>
        <button id="resetButton" class="warn" type="button">Use bundled tiny</button>
        <button id="refreshButton" type="button">Refresh</button>
      </div>

      <div id="message" class="message" role="status"></div>
    </form>
  </main>

  <script src="options.js"></script>
</body>
</html>
